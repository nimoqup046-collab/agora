[build]
builder = "dockerfile"

# ── API Service ───────────────────────────────────────────────────────────────
# Built from repo root so it can access packages/adapter + packages/orchestrator + packages/memory
[[services]]
name = "agora-api"
source = "."

[services.build]
dockerfilePath = "apps/api/Dockerfile"
dockerContext = "."

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3

# ── Web Service ───────────────────────────────────────────────────────────────
# Built from apps/web with standalone Next.js output
[[services]]
name = "agora-web"
source = "apps/web"

[services.build]
dockerfilePath = "apps/web/Dockerfile"
dockerContext = "apps/web"

[services.deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3
