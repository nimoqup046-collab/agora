services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: agora-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEFAULT_MODEL_CLAUDE
        value: deepseek-chat
      - key: DEFAULT_MODEL_CODEX
        value: deepseek-chat
      - key: DEFAULT_MODEL_META
        value: deepseek-chat
      - key: LOG_LEVEL
        value: info

  # ── Frontend: Next.js ─────────────────────────────────────────────────────
  - type: web
    name: agora-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
