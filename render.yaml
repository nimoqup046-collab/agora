services:
  - type: web
    name: agora-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: API_CORS_ORIGINS
        sync: false
      - key: DEFAULT_MODEL_CLAUDE
        value: deepseek-chat
      - key: DEFAULT_MODEL_CODEX
        value: deepseek-chat
      - key: DEFAULT_MODEL_META
        value: deepseek-chat
      - key: LOG_LEVEL
        value: info

  - type: web
    name: agora-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
